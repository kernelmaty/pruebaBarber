<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservá tu turno — TurnosCut</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --black:#09090b;--surface:#111113;--card:#18181c;--card2:#1e1e24;
  --border:#27272d;--border2:#32323a;
  --gold:#c9a84c;--gold-l:#e8c97a;--gold-d:#7a6230;--gold-bg:rgba(201,168,76,.09);
  --white:#f5f2ed;--muted:#71717a;--muted2:#a1a1aa;
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);
  --red:#ef4444;--red-bg:rgba(239,68,68,.1);
  --wp:#25D366;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--black);color:var(--white);
  min-height:100vh;
  background-image:
    radial-gradient(ellipse 70% 50% at 50% -10%, rgba(201,168,76,.12) 0%, transparent 65%),
    radial-gradient(ellipse 40% 30% at 80% 90%, rgba(201,168,76,.05) 0%, transparent 60%);
}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* LAYOUT */
.page{max-width:560px;margin:0 auto;padding:0 16px 60px}

/* HEADER */
.header{
  padding:28px 0 24px;text-align:center;
  border-bottom:1px solid var(--border);margin-bottom:28px;
}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.1em;color:var(--gold);margin-bottom:10px}
.header-logo span{color:var(--muted)}
.barberia-avatar{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold-d),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--black);
  margin:0 auto 14px;
  box-shadow:0 0 0 3px var(--black), 0 0 0 5px var(--gold-d);
}
.barberia-nombre{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.04em;line-height:1}
.barberia-ciudad{font-size:.82rem;color:var(--muted2);margin-top:4px}
.barberia-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--green-bg);color:var(--green);
  border:1px solid rgba(34,197,94,.2);
  font-size:.7rem;font-weight:700;letter-spacing:.08em;
  padding:3px 10px;border-radius:20px;text-transform:uppercase;
  margin-top:8px;
}

/* STEPPER */
.stepper{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:32px}
.step-item{display:flex;align-items:center}
.step-circle{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.78rem;font-weight:700;
  transition:all .3s;flex-shrink:0;
}
.step-circle.done{background:var(--gold);color:var(--black)}
.step-circle.active{background:var(--white);color:var(--black);box-shadow:0 0 0 3px var(--gold-d)}
.step-circle.pending{background:var(--card2);color:var(--muted);border:1px solid var(--border)}
.step-label{font-size:.68rem;font-weight:600;margin-top:5px;color:var(--muted2);white-space:nowrap}
.step-label.active{color:var(--white)}
.step-label.done{color:var(--gold)}
.step-connector{width:40px;height:1px;background:var(--border);flex-shrink:0}
.step-connector.done{background:var(--gold-d)}
.step-inner{display:flex;flex-direction:column;align-items:center}

/* SECTION TITLE */
.section-title{
  font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.04em;
  margin-bottom:16px;
}
.section-title span{color:var(--gold)}

/* SERVICIO CARDS */
.servicios-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.servicio-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:13px;padding:16px 18px;
  display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:border-color .2s,transform .15s,background .15s;
  position:relative;overflow:hidden;
}
.servicio-card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--gold);opacity:0;transition:opacity .2s;
}
.servicio-card:hover{border-color:var(--border2);transform:translateX(2px)}
.servicio-card.selected{border-color:var(--gold);background:var(--gold-bg)}
.servicio-card.selected::before{opacity:1}
.servicio-icon{
  width:42px;height:42px;border-radius:10px;
  background:var(--card2);display:flex;align-items:center;
  justify-content:center;font-size:1.3rem;flex-shrink:0;
}
.servicio-info{flex:1}
.servicio-nombre{font-weight:600;font-size:.92rem;color:var(--white);margin-bottom:3px}
.servicio-duracion{font-size:.74rem;color:var(--muted)}
.servicio-precio{
  font-family:'Bebas Neue',sans-serif;font-size:1.4rem;
  color:var(--gold);flex-shrink:0;
}
.check-icon{
  width:22px;height:22px;border-radius:50%;
  background:var(--gold);color:var(--black);
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;font-weight:900;flex-shrink:0;
  opacity:0;transition:opacity .2s;
}
.servicio-card.selected .check-icon{opacity:1}

/* BARBEROS */
.barberos-grid{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.barbero-card{
  flex:1;min-width:130px;
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:16px;text-align:center;
  cursor:pointer;transition:all .2s;
}
.barbero-card:hover{border-color:var(--border2)}
.barbero-card.selected{border-color:var(--gold);background:var(--gold-bg)}
.barbero-avatar{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold-d),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:1.1rem;color:var(--black);
  margin:0 auto 10px;
}
.barbero-nombre{font-weight:600;font-size:.84rem;color:var(--white)}
.barbero-rol{font-size:.72rem;color:var(--muted)}

/* CALENDARIO */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-titulo{font-weight:600;font-size:.95rem}
.cal-nav{background:var(--card2);border:1px solid var(--border);color:var(--white);padding:6px 12px;border-radius:7px;font-size:.8rem}
.cal-nav:hover{border-color:var(--border2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:20px}
.cal-day-header{text-align:center;font-size:.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;padding:4px 0}
.cal-day{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:8px;font-size:.82rem;font-weight:500;
  cursor:pointer;transition:all .15s;border:1px solid transparent;
}
.cal-day.empty{cursor:default}
.cal-day.past{color:var(--muted);cursor:default;opacity:.4}
.cal-day.today{border-color:var(--border2);color:var(--white)}
.cal-day.available:hover{background:var(--card2);border-color:var(--border2)}
.cal-day.selected{background:var(--gold);color:var(--black);font-weight:700;border-color:var(--gold)}
.cal-day.has-turnos{position:relative}
.cal-day.has-turnos::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:.5}

/* HORARIOS */
.horarios-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px}
.horario-btn{
  background:var(--card);border:1px solid var(--border);
  color:var(--muted2);padding:10px 6px;border-radius:9px;
  font-size:.82rem;font-weight:500;text-align:center;
  cursor:pointer;transition:all .15s;
}
.horario-btn:hover:not(:disabled){background:var(--card2);border-color:var(--border2);color:var(--white)}
.horario-btn.selected{background:var(--gold);color:var(--black);border-color:var(--gold);font-weight:700}
.horario-btn:disabled{opacity:.3;cursor:not-allowed}
.horario-btn.ocupado{opacity:.25;cursor:not-allowed;text-decoration:line-through}

/* FORM */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.75rem;font-weight:600;color:var(--muted2);margin-bottom:5px;letter-spacing:.04em}
.form-input,.form-textarea{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--white);padding:12px 14px;border-radius:9px;font-size:.9rem;
  outline:none;transition:border-color .2s;
}
.form-input:focus,.form-textarea:focus{border-color:var(--gold)}
.form-textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* RESUMEN */
.resumen-card{
  background:var(--card);border:1px solid var(--border2);
  border-radius:14px;padding:20px;margin-bottom:20px;
}
.resumen-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.resumen-row:last-child{border-bottom:none;padding-top:12px}
.resumen-label{font-size:.8rem;color:var(--muted)}
.resumen-valor{font-size:.88rem;font-weight:600;color:var(--white)}
.resumen-precio{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--gold)}

/* BTNS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:13px 24px;border-radius:10px;font-size:.9rem;font-weight:700;border:none;transition:all .2s;cursor:pointer;width:100%}
.btn-gold{background:var(--gold);color:var(--black);box-shadow:0 4px 24px rgba(201,168,76,.25)}
.btn-gold:hover{background:var(--gold-l);transform:translateY(-2px);box-shadow:0 6px 32px rgba(201,168,76,.35)}
.btn-outline{background:transparent;color:var(--white);border:1px solid var(--border2);margin-bottom:10px}
.btn-outline:hover{border-color:var(--gold-d)}
.btn-wp{background:var(--wp);color:#fff}
.btn-wp:hover{background:#1da851}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none}
.btn-sm{padding:9px 16px;font-size:.8rem;width:auto}

/* ÉXITO */
.success-screen{text-align:center;padding:20px 0}
.success-icon{
  width:80px;height:80px;border-radius:50%;
  background:var(--green-bg);border:2px solid rgba(34,197,94,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;margin:0 auto 20px;
  animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.success-title{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:.04em;color:var(--green);margin-bottom:8px}
.success-desc{font-size:.88rem;color:var(--muted2);line-height:1.6;margin-bottom:24px}
.confirm-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:20px;margin-bottom:20px;text-align:left;
}
.confirm-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.confirm-row:last-child{border-bottom:none}
.confirm-icon{font-size:1.1rem;width:28px;text-align:center;flex-shrink:0}
.confirm-info{}
.confirm-label{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.confirm-val{font-size:.9rem;font-weight:600;color:var(--white)}

/* LOADING / ERROR */
.loading{display:flex;align-items:center;justify-content:center;min-height:50vh;flex-direction:column;gap:12px;color:var(--muted)}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-screen{text-align:center;padding:60px 20px;color:var(--muted)}
.error-icon{font-size:2.5rem;margin-bottom:14px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp .35s ease both}

/* CONFIG screen */
.config-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.config-box{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:36px;width:100%;max-width:420px}
.config-logo{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--gold);margin-bottom:4px}
.config-logo span{color:var(--white)}
.config-sub{font-size:.82rem;color:var(--muted2);margin-bottom:24px;line-height:1.5}
.form-hint{font-size:.72rem;color:var(--muted);margin-top:4px}
.form-hint a{color:var(--gold);text-decoration:none}

@media(max-width:480px){
  .horarios-grid{grid-template-columns:repeat(3,1fr)}
  .form-row{grid-template-columns:1fr}
  .barberos-grid{flex-direction:column}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ── UTILS ──────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',minimumFractionDigits:0}).format(n||0);
const initials = s => (s||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const diasSemana = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

// Leer parámetros de URL: ?empresa=slug&sb_url=...&sb_key=...
const getParam = (k) => new URLSearchParams(window.location.search).get(k);

// ── SUPABASE ───────────────────────────────────────────────
let sb = null;
const initSB = (url, key) => {
  if (!sb) sb = window.supabase.createClient(url, key);
  return sb;
};

// ── HORARIOS DISPONIBLES ───────────────────────────────────
const generarHorarios = (apertura='09:00', cierre='20:00', duracion=30, ocupados=[]) => {
  const slots = [];
  const [ha, ma] = apertura.split(':').map(Number);
  const [hc, mc] = cierre.split(':').map(Number);
  let mins = ha*60 + ma;
  const finMins = hc*60 + mc;
  while (mins + duracion <= finMins) {
    const hh = String(Math.floor(mins/60)).padStart(2,'0');
    const mm = String(mins%60).padStart(2,'0');
    const hora = `${hh}:${mm}`;
    slots.push({ hora, ocupado: ocupados.includes(hora) });
    mins += 30; // slots cada 30 min, el cliente elige su servicio
  }
  return slots;
};

// ── STEP INDICATOR ─────────────────────────────────────────
function Stepper({ step }) {
  const steps = ['Servicio','Barbero','Fecha','Tus datos'];
  return (
    <div className="stepper">
      {steps.map((s, i) => {
        const n = i + 1;
        const st = step > n ? 'done' : step === n ? 'active' : 'pending';
        return (
          <div key={s} className="step-item">
            <div className="step-inner">
              <div className={`step-circle ${st}`}>{st==='done' ? '✓' : n}</div>
              <div className={`step-label ${st}`}>{s}</div>
            </div>
            {i < steps.length-1 && <div className={`step-connector ${step > n ? 'done' : ''}`} style={{marginBottom:14}} />}
          </div>
        );
      })}
    </div>
  );
}

// ── CALENDARIO ─────────────────────────────────────────────
function Calendario({ selectedDate, onSelect, turnosOcupados=[] }) {
  const [mes, setMes] = useState(() => {
    const d = new Date(); return { y: d.getFullYear(), m: d.getMonth() };
  });

  const hoy = new Date(); hoy.setHours(0,0,0,0);

  const primerDia = new Date(mes.y, mes.m, 1).getDay();
  const diasEnMes = new Date(mes.y, mes.m+1, 0).getDate();

  const celdas = [];
  for (let i=0; i<primerDia; i++) celdas.push(null);
  for (let d=1; d<=diasEnMes; d++) celdas.push(d);

  const formatFecha = (d) => {
    const dd = String(d).padStart(2,'0');
    const mm = String(mes.m+1).padStart(2,'0');
    return `${mes.y}-${mm}-${dd}`;
  };

  const isPast = (d) => {
    const fecha = new Date(mes.y, mes.m, d);
    return fecha < hoy;
  };

  const isSelected = (d) => selectedDate === formatFecha(d);

  const prev = () => setMes(m => m.m===0 ? {y:m.y-1,m:11} : {y:m.y,m:m.m-1});
  const next = () => setMes(m => m.m===11 ? {y:m.y+1,m:0} : {y:m.y,m:m.m+1});

  return (
    <div>
      <div className="cal-header">
        <button className="cal-nav" onClick={prev}>‹</button>
        <span className="cal-titulo">{meses[mes.m]} {mes.y}</span>
        <button className="cal-nav" onClick={next}>›</button>
      </div>
      <div className="cal-grid">
        {diasSemana.map(d => <div key={d} className="cal-day-header">{d}</div>)}
        {celdas.map((d, i) => {
          if (!d) return <div key={`e${i}`} className="cal-day empty" />;
          const past = isPast(d);
          const sel  = isSelected(d);
          const fecha = formatFecha(d);
          const hasTurnos = turnosOcupados.includes(fecha);
          return (
            <div
              key={d}
              className={`cal-day ${past?'past':'available'} ${sel?'selected':''} ${hasTurnos&&!past?'has-turnos':''}`}
              onClick={() => !past && onSelect(fecha)}
            >{d}</div>
          );
        })}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  PANTALLA: CONFIG (si no hay parámetros en la URL)
// ══════════════════════════════════════════════════════════
function ConfigScreen() {
  const [url, setUrl]   = useState(localStorage.getItem('tc_url')||'');
  const [key, setKey]   = useState(localStorage.getItem('tc_key')||'');
  const [slug, setSlug] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr]   = useState('');

  const entrar = () => {
    if (!url||!key||!slug) { setErr('Completá todos los campos'); return; }
    const params = new URLSearchParams({ sb_url:url.trim(), sb_key:key.trim(), empresa:slug.trim() });
    window.location.search = params.toString();
  };

  return (
    <div className="config-screen">
      <div className="config-box">
        <div className="config-logo">Turnos<span>Cut</span></div>
        <div className="config-sub">Esta es la página pública de reservas. Configurá los datos para generar el link de tu barbería.</div>
        <div className="form-group">
          <label className="form-label">Supabase URL</label>
          <input className="form-input" value={url} onChange={e=>setUrl(e.target.value)} placeholder="https://xxx.supabase.co" />
        </div>
        <div className="form-group">
          <label className="form-label">Supabase Anon Key</label>
          <input className="form-input" type="password" value={key} onChange={e=>setKey(e.target.value)} placeholder="eyJ..." />
        </div>
        <div className="form-group">
          <label className="form-label">Slug de tu barbería</label>
          <input className="form-input" value={slug} onChange={e=>setSlug(e.target.value)} placeholder="la-vieja-escuela" />
          <div className="form-hint">Lo encontrás en Supabase → tabla empresas → columna slug</div>
        </div>
        {err && <div style={{color:'var(--red)',fontSize:'.78rem',marginBottom:10}}>⚠️ {err}</div>}
        <button className="btn btn-gold" onClick={entrar}>Ver página de reservas →</button>
        <div style={{marginTop:14,fontSize:'.72rem',color:'var(--muted)',textAlign:'center'}}>
          El link final para tus clientes se verá así:<br/>
          <code style={{color:'var(--gold-l)'}}>turnoscut.html?empresa=tu-barberia&sb_url=...&sb_key=...</code>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
//  APP PRINCIPAL
// ══════════════════════════════════════════════════════════
function App() {
  const sbUrl    = getParam('sb_url') || localStorage.getItem('tc_url');
  const sbKey    = getParam('sb_key') || localStorage.getItem('tc_key');
  const empSlug  = getParam('empresa');

  // Sin parámetros → pantalla de config
  if (!sbUrl || !sbKey || !empSlug) return <ConfigScreen />;

  const client = initSB(sbUrl, sbKey);

  const [loading,   setLoading]   = useState(true);
  const [empresa,   setEmpresa]   = useState(null);
  const [servicios, setServicios] = useState([]);
  const [barberos,  setBarberos]  = useState([]);
  const [error,     setError]     = useState('');

  // Wizard state
  const [step,       setStep]       = useState(1);
  const [servicio,   setServicio]   = useState(null);
  const [barbero,    setBarbero]    = useState(null);
  const [fecha,      setFecha]      = useState('');
  const [horaSlot,   setHoraSlot]   = useState('');
  const [horariosOcupados, setHorariosOcupados] = useState([]);
  const [loadingHorarios, setLoadingHorarios]   = useState(false);

  const [nombre,    setNombre]    = useState('');
  const [telefono,  setTelefono] = useState('');
  const [email,     setEmail]    = useState('');
  const [notas,     setNotas]    = useState('');

  const [sending,   setSending]  = useState(false);
  const [turnoOK,   setTurnoOK]  = useState(null);

  // Cargar datos de la barbería
  useEffect(() => {
    (async () => {
      try {
        const { data: emp, error: e1 } = await client.from('empresas').select('*').eq('slug', empSlug).single();
        if (e1||!emp) { setError('Barbería no encontrada'); setLoading(false); return; }
        setEmpresa(emp);

        const [{ data: svcs }, { data: usrs }] = await Promise.all([
          client.from('servicios').select('*').eq('empresa_id', emp.id).eq('activo', true).order('precio'),
          client.from('usuarios').select('*').eq('empresa_id', emp.id).eq('activo', true),
        ]);
        setServicios(svcs||[]);
        setBarberos(usrs||[]);
      } catch(e) {
        setError('Error cargando la barbería');
      }
      setLoading(false);
    })();
  }, []);

  // Cargar horarios ocupados cuando cambia fecha + barbero
  useEffect(() => {
    if (!fecha || !barbero || !empresa) return;
    setLoadingHorarios(true);
    setHoraSlot('');
    client.from('turnos')
      .select('hora_inicio,hora_fin')
      .eq('empresa_id', empresa.id)
      .eq('barbero_id', barbero.id)
      .eq('fecha', fecha)
      .in('estado', ['pendiente','confirmado','completado'])
      .then(({ data }) => {
        const ocupados = (data||[]).map(t => t.hora_inicio.slice(0,5));
        setHorariosOcupados(ocupados);
        setLoadingHorarios(false);
      });
  }, [fecha, barbero, empresa]);

  const horarios = useMemo(() =>
    generarHorarios('09:00','20:00', servicio?.duracion_min||30, horariosOcupados),
    [servicio, horariosOcupados]
  );

  // Confirmar turno
  const confirmarTurno = async () => {
    if (!nombre || !telefono) return;
    setSending(true);
    try {
      // 1. Crear o encontrar cliente
      let clienteId = null;
      const { data: cl } = await client.from('clientes')
        .select('id').eq('empresa_id', empresa.id).eq('telefono', telefono).single();
      if (cl) {
        clienteId = cl.id;
      } else {
        const { data: newCl } = await client.from('clientes').insert({
          empresa_id: empresa.id, nombre, telefono, email, activo: true
        }).select('id').single();
        if (newCl) clienteId = newCl.id;
      }

      // 2. Calcular hora fin
      const [h, m] = horaSlot.split(':').map(Number);
      const dur = servicio.duracion_min || 30;
      const hf = `${String(h+Math.floor((m+dur)/60)).padStart(2,'0')}:${String((m+dur)%60).padStart(2,'0')}`;

      // 3. Insertar turno
      const { data: turno, error: tErr } = await client.from('turnos').insert({
        empresa_id:     empresa.id,
        cliente_id:     clienteId,
        barbero_id:     barbero.id,
        servicio_id:    servicio.id,
        fecha,
        hora_inicio:    horaSlot + ':00',
        hora_fin:       hf + ':00',
        precio_cobrado: servicio.precio,
        estado:         'pendiente',
        notas,
      }).select().single();

      if (tErr) throw tErr;

      setTurnoOK({
        turno, cliente: { nombre, telefono },
        servicio, barbero, fecha, hora: horaSlot
      });
      setStep(5);

    } catch(e) {
      alert('Error al reservar: ' + e.message);
    }
    setSending(false);
  };

  const formatFechaDisplay = (f) => {
    if (!f) return '';
    const [y,m,d] = f.split('-');
    const date = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
    return date.toLocaleDateString('es-AR', { weekday:'long', day:'numeric', month:'long' });
  };

  // ── LOADING / ERROR ────────────────────────────────────
  if (loading) return (
    <div className="loading">
      <div className="loading-spinner" />
      <span>Cargando barbería...</span>
    </div>
  );

  if (error) return (
    <div className="error-screen">
      <div className="error-icon">💈</div>
      <div style={{fontWeight:600,marginBottom:6}}>{error}</div>
      <div style={{fontSize:'.8rem'}}>Verificá el link o contactá a la barbería.</div>
    </div>
  );

  // ── ÉXITO ──────────────────────────────────────────────
  if (step === 5 && turnoOK) return (
    <div className="page">
      <div className="header" style={{marginBottom:24}}>
        <div className="header-logo">Turnos<span>Cut</span></div>
        <div className="barberia-nombre">{empresa.nombre}</div>
      </div>
      <div className="success-screen fade-up">
        <div className="success-icon">✅</div>
        <div className="success-title">¡Turno confirmado!</div>
        <div className="success-desc">
          Te esperamos, <strong>{turnoOK.cliente.nombre}</strong>.<br/>
          Recordá que si no podés asistir, avisanos con anticipación.
        </div>

        <div className="confirm-card">
          <div className="confirm-row">
            <span className="confirm-icon">✂️</span>
            <div className="confirm-info">
              <div className="confirm-label">Servicio</div>
              <div className="confirm-val">{turnoOK.servicio.nombre}</div>
            </div>
          </div>
          <div className="confirm-row">
            <span className="confirm-icon">👤</span>
            <div className="confirm-info">
              <div className="confirm-label">Barbero</div>
              <div className="confirm-val">{turnoOK.barbero.nombre}</div>
            </div>
          </div>
          <div className="confirm-row">
            <span className="confirm-icon">📅</span>
            <div className="confirm-info">
              <div className="confirm-label">Fecha</div>
              <div className="confirm-val" style={{textTransform:'capitalize'}}>{formatFechaDisplay(turnoOK.fecha)}</div>
            </div>
          </div>
          <div className="confirm-row">
            <span className="confirm-icon">🕐</span>
            <div className="confirm-info">
              <div className="confirm-label">Hora</div>
              <div className="confirm-val">{turnoOK.hora} hs</div>
            </div>
          </div>
          <div className="confirm-row">
            <span className="confirm-icon">💰</span>
            <div className="confirm-info">
              <div className="confirm-label">Precio</div>
              <div className="confirm-val" style={{color:'var(--gold)',fontFamily:'Bebas Neue',fontSize:'1.2rem'}}>{fmt(turnoOK.servicio.precio)}</div>
            </div>
          </div>
        </div>

        <a
          href={`https://wa.me/54${(empresa.telefono||'').replace(/\D/g,'')}?text=${encodeURIComponent(`Hola! Acabo de reservar un turno para el ${formatFechaDisplay(turnoOK.fecha)} a las ${turnoOK.hora} hs. Soy ${turnoOK.cliente.nombre}. ¡Gracias!`)}`}
          className="btn btn-wp"
          target="_blank"
          rel="noreferrer"
          style={{marginBottom:10,textDecoration:'none'}}
        >
          💬 Confirmar por WhatsApp
        </a>
        <button className="btn btn-outline" onClick={()=>{ setStep(1);setServicio(null);setBarbero(null);setFecha('');setHoraSlot('');setNombre('');setTelefono('');setEmail('');setNotas('');setTurnoOK(null); }}>
          Reservar otro turno
        </button>
      </div>
    </div>
  );

  // ── WIZARD ─────────────────────────────────────────────
  return (
    <div className="page">
      {/* Header */}
      <div className="header">
        <div className="header-logo">Turnos<span>Cut</span></div>
        <div className="barberia-avatar">{initials(empresa.nombre)}</div>
        <div className="barberia-nombre">{empresa.nombre}</div>
        {empresa.ciudad && <div className="barberia-ciudad">📍 {empresa.ciudad}{empresa.provincia ? `, ${empresa.provincia}` : ''}</div>}
        <div className="barberia-badge"><span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block'}}/> Turnos disponibles</div>
      </div>

      {/* Stepper */}
      <Stepper step={step} />

      {/* PASO 1: SERVICIO */}
      {step === 1 && (
        <div className="fade-up">
          <div className="section-title">¿Qué <span>servicio</span> querés?</div>
          <div className="servicios-grid">
            {servicios.map(s => (
              <div
                key={s.id}
                className={`servicio-card ${servicio?.id===s.id?'selected':''}`}
                onClick={() => { setServicio(s); setTimeout(()=>setStep(2),200); }}
              >
                <div className="servicio-icon">{s.nombre.toLowerCase().includes('barba')?'🪒':s.nombre.toLowerCase().includes('infantil')?'👦':'✂️'}</div>
                <div className="servicio-info">
                  <div className="servicio-nombre">{s.nombre}</div>
                  <div className="servicio-duracion">⏱ {s.duracion_min} minutos</div>
                  {s.descripcion && <div style={{fontSize:'.73rem',color:'var(--muted)',marginTop:2}}>{s.descripcion}</div>}
                </div>
                <div className="servicio-precio">{fmt(s.precio)}</div>
                <div className="check-icon">✓</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* PASO 2: BARBERO */}
      {step === 2 && (
        <div className="fade-up">
          <div className="section-title">Elegí tu <span>barbero</span></div>
          <div className="barberos-grid">
            {barberos.map(b => (
              <div
                key={b.id}
                className={`barbero-card ${barbero?.id===b.id?'selected':''}`}
                onClick={() => { setBarbero(b); setTimeout(()=>setStep(3),200); }}
              >
                <div className="barbero-avatar">{initials(b.nombre)}</div>
                <div className="barbero-nombre">{b.nombre}</div>
                <div className="barbero-rol">{b.rol==='dueño'?'Dueño':'Barbero'}</div>
              </div>
            ))}
            {barberos.length === 0 && (
              <div style={{color:'var(--muted)',fontSize:'.85rem',padding:'20px 0'}}>No hay barberos disponibles.</div>
            )}
          </div>
          <button className="btn btn-outline btn-sm" onClick={()=>setStep(1)}>← Volver</button>
        </div>
      )}

      {/* PASO 3: FECHA + HORA */}
      {step === 3 && (
        <div className="fade-up">
          <div className="section-title">¿Cuándo <span>venís</span>?</div>
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:14,padding:'20px',marginBottom:20}}>
            <Calendario
              selectedDate={fecha}
              onSelect={d => setFecha(d)}
            />
          </div>

          {fecha && (
            <div style={{marginBottom:20}}>
              <div style={{fontWeight:600,fontSize:'.88rem',marginBottom:12,color:'var(--white)'}}>
                📅 {formatFechaDisplay(fecha)} — Horarios disponibles
              </div>
              {loadingHorarios ? (
                <div style={{textAlign:'center',padding:'20px',color:'var(--muted)'}}>⏳ Cargando horarios...</div>
              ) : (
                <div className="horarios-grid">
                  {horarios.map(h => (
                    <button
                      key={h.hora}
                      className={`horario-btn ${h.ocupado?'ocupado':''} ${horaSlot===h.hora?'selected':''}`}
                      disabled={h.ocupado}
                      onClick={() => setHoraSlot(h.hora)}
                    >{h.hora}</button>
                  ))}
                </div>
              )}
            </div>
          )}

          <button
            className="btn btn-gold"
            disabled={!fecha || !horaSlot}
            onClick={() => setStep(4)}
            style={{marginBottom:10}}
          >
            Continuar →
          </button>
          <button className="btn btn-outline btn-sm" onClick={()=>setStep(2)}>← Volver</button>
        </div>
      )}

      {/* PASO 4: DATOS PERSONALES */}
      {step === 4 && (
        <div className="fade-up">
          <div className="section-title">Tus <span>datos</span></div>

          {/* Resumen del turno */}
          <div className="resumen-card">
            <div className="resumen-row">
              <span className="resumen-label">✂️ Servicio</span>
              <span className="resumen-valor">{servicio?.nombre}</span>
            </div>
            <div className="resumen-row">
              <span className="resumen-label">👤 Barbero</span>
              <span className="resumen-valor">{barbero?.nombre}</span>
            </div>
            <div className="resumen-row">
              <span className="resumen-label">📅 Fecha</span>
              <span className="resumen-valor" style={{textTransform:'capitalize',fontSize:'.82rem'}}>{formatFechaDisplay(fecha)}</span>
            </div>
            <div className="resumen-row">
              <span className="resumen-label">🕐 Hora</span>
              <span className="resumen-valor">{horaSlot} hs</span>
            </div>
            <div className="resumen-row" style={{paddingTop:14}}>
              <span className="resumen-label">Total</span>
              <span className="resumen-precio">{fmt(servicio?.precio)}</span>
            </div>
          </div>

          <div className="form-group">
            <label className="form-label">Tu nombre *</label>
            <input className="form-input" value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ej: Juan García" />
          </div>
          <div className="form-row">
            <div className="form-group">
              <label className="form-label">Celular *</label>
              <input className="form-input" type="tel" value={telefono} onChange={e=>setTelefono(e.target.value)} placeholder="Ej: 3415551234" />
            </div>
            <div className="form-group">
              <label className="form-label">Email</label>
              <input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="Opcional" />
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">¿Algo que quieras aclarar?</label>
            <textarea className="form-textarea" value={notas} onChange={e=>setNotas(e.target.value)} placeholder="Ej: Primera vez, quiero fade bajo con barba recortada..." />
          </div>

          <button
            className="btn btn-gold"
            disabled={!nombre || !telefono || sending}
            onClick={confirmarTurno}
            style={{marginBottom:10}}
          >
            {sending ? '⏳ Reservando...' : '✅ Confirmar turno'}
          </button>
          <button className="btn btn-outline btn-sm" onClick={()=>setStep(3)}>← Volver</button>

          <div style={{marginTop:16,fontSize:'.72rem',color:'var(--muted)',textAlign:'center',lineHeight:1.6}}>
            🔒 Tus datos se guardan de forma segura y solo se usan para gestionar tu turno.
            No compartimos tu información con terceros.
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
