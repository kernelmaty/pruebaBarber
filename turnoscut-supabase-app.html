<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TurnosCut — Sistema Real con Supabase</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<!-- Supabase JS v2 - carga primero -->
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>


<style>
/* ── VARIABLES ─────────────────────────────── */
:root {
  --black:    #09090b;
  --surface:  #111113;
  --card:     #18181c;
  --card2:    #1e1e24;
  --border:   #27272d;
  --border2:  #32323a;
  --gold:     #c9a84c;
  --gold-l:   #e8c97a;
  --gold-d:   #7a6230;
  --gold-bg:  rgba(201,168,76,0.08);
  --white:    #f5f2ed;
  --muted:    #71717a;
  --muted2:   #a1a1aa;
  --red:      #ef4444;
  --red-bg:   rgba(239,68,68,0.10);
  --green:    #22c55e;
  --green-bg: rgba(34,197,94,0.10);
  --blue:     #3b82f6;
  --blue-bg:  rgba(59,130,246,0.10);
  --amber:    #f59e0b;
  --amber-bg: rgba(245,158,11,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* ── CONFIG SCREEN ─────────────────────────── */
.config-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--black);padding:24px;
  background-image:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(201,168,76,0.10) 0%,transparent 70%);
}
.config-box{
  background:var(--card);border:1px solid var(--border2);
  border-radius:20px;padding:40px;width:100%;max-width:480px;
}
.config-logo{
  font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:0.08em;
  color:var(--gold);margin-bottom:6px;
}
.config-logo span{color:var(--white)}
.config-subtitle{font-size:0.85rem;color:var(--muted2);margin-bottom:32px;line-height:1.5}
.config-step{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:18px;margin-bottom:16px;
}
.config-step-num{
  width:26px;height:26px;border-radius:50%;
  background:var(--gold);color:var(--black);
  font-weight:700;font-size:0.8rem;display:inline-flex;
  align-items:center;justify-content:center;margin-bottom:10px;
}
.config-step-title{font-weight:600;font-size:0.88rem;color:var(--white);margin-bottom:4px}
.config-step-desc{font-size:0.78rem;color:var(--muted2);line-height:1.55}
.config-step a{color:var(--gold);text-decoration:none}
.config-step a:hover{text-decoration:underline}
.config-divider{border:none;border-top:1px solid var(--border);margin:24px 0}
.config-form-title{font-weight:600;font-size:0.9rem;margin-bottom:16px;color:var(--white)}

/* ── LAYOUT ─────────────────────────────────── */
.app{display:flex;min-height:100vh}

/* ── SIDEBAR ─────────────────────────────────── */
.sidebar{
  width:230px;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:50;
}
.sidebar-logo{
  padding:20px 18px 16px;border-bottom:1px solid var(--border);
  font-family:'Bebas Neue',sans-serif;font-size:1.5rem;
  letter-spacing:0.06em;color:var(--gold);
}
.sidebar-logo span{color:var(--white)}
.sidebar-empresa{
  padding:12px 18px;border-bottom:1px solid var(--border);
}
.sidebar-empresa-name{font-size:0.8rem;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plan-badge{
  display:inline-flex;align-items:center;
  background:var(--gold-bg);color:var(--gold);
  font-size:0.65rem;font-weight:700;letter-spacing:0.1em;
  padding:2px 8px;border-radius:4px;text-transform:uppercase;margin-top:4px;
}
.nav{flex:1;padding:10px 8px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.nav-section{font-size:0.63rem;font-weight:600;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;padding:10px 10px 5px}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:8px 10px;border-radius:7px;
  font-size:0.84rem;font-weight:500;color:var(--muted2);
  background:none;border:none;width:100%;text-align:left;
  transition:background .15s,color .15s;
}
.nav-item:hover{background:var(--card);color:var(--white)}
.nav-item.active{background:var(--gold-bg);color:var(--gold)}
.nav-icon{font-size:0.95rem;width:18px;text-align:center;flex-shrink:0}
.nav-badge{
  margin-left:auto;background:var(--red);color:#fff;
  font-size:0.62rem;font-weight:700;min-width:17px;height:17px;
  border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px;
}
.sidebar-footer{
  padding:12px 18px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.sidebar-footer-text{font-size:0.72rem;color:var(--muted)}
.logout-btn{
  font-size:0.72rem;color:var(--muted);background:none;border:none;
  cursor:pointer;transition:color .15s;
}
.logout-btn:hover{color:var(--red)}

/* ── MAIN ────────────────────────────────────── */
.main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  position:sticky;top:0;z-index:40;
  background:rgba(9,9,11,.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:13px 26px;display:flex;align-items:center;justify-content:space-between;
}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.05em}
.topbar-right{display:flex;align-items:center;gap:10px}
.realtime-dot{
  width:7px;height:7px;border-radius:50%;background:var(--green);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.content{padding:24px;flex:1}

/* ── BOTONES ─────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:7px;font-size:0.8rem;font-weight:600;
  border:none;transition:all .15s;cursor:pointer;
}
.btn-gold{background:var(--gold);color:var(--black)}
.btn-gold:hover{background:var(--gold-l);transform:translateY(-1px)}
.btn-outline{background:transparent;color:var(--white);border:1px solid var(--border2)}
.btn-outline:hover{border-color:var(--gold-d);color:var(--gold)}
.btn-ghost{background:transparent;color:var(--muted2);border:none;padding:7px 9px}
.btn-ghost:hover{color:var(--white)}
.btn-red{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-red:hover{background:rgba(239,68,68,.2)}
.btn-green{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.btn-green:hover{background:rgba(34,197,94,.2)}
.btn-sm{padding:4px 10px;font-size:0.73rem}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ── CARDS ───────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:20px 18px;position:relative;overflow:hidden;
  transition:border-color .2s,transform .2s;
}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-card.gold::after{background:var(--gold)}
.stat-card.green::after{background:var(--green)}
.stat-card.red::after{background:var(--red)}
.stat-card.blue::after{background:var(--blue)}
.stat-label{font-size:0.72rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.stat-value{font-family:'Bebas Neue',sans-serif;font-size:2rem;line-height:1;color:var(--white)}
.stat-sub{font-size:0.73rem;color:var(--muted2);margin-top:5px}
.stat-icon{position:absolute;top:16px;right:16px;font-size:1.4rem;opacity:.35}

.card{background:var(--card);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:18px}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-title{font-weight:600;font-size:0.9rem}
.card-body{padding:18px 20px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ── TABLA ───────────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.83rem}
th{padding:10px 13px;text-align:left;font-size:0.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);background:var(--surface)}
td{padding:11px 13px;border-bottom:1px solid var(--border);color:var(--muted2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--card2);color:var(--white)}

/* ── BADGES ──────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:0.7rem;font-weight:600}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-gold{background:var(--gold-bg);color:var(--gold)}
.badge-muted{background:var(--card2);color:var(--muted2)}

/* ── FORM ────────────────────────────────────── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:0.75rem;font-weight:600;color:var(--muted2);margin-bottom:5px;letter-spacing:.04em}
.form-input,.form-select,.form-textarea{
  width:100%;background:var(--surface);border:1px solid var(--border2);
  color:var(--white);padding:9px 12px;border-radius:7px;font-size:0.84rem;
  outline:none;transition:border-color .2s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold)}
.form-select option{background:var(--surface)}
.form-textarea{resize:vertical;min-height:75px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-error{font-size:0.75rem;color:var(--red);margin-top:4px}

/* ── MODAL ───────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;
}
.modal{
  background:var(--card);border:1px solid var(--border2);
  border-radius:16px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;
  animation:modalIn .2s ease;
}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-weight:700;font-size:0.95rem}
.modal-body{padding:22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:9px;justify-content:flex-end}

/* ── OTROS ───────────────────────────────────── */
.avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold-d),var(--gold));
  display:inline-flex;align-items:center;justify-content:center;
  font-weight:700;font-size:0.75rem;color:var(--black);flex-shrink:0;
}
.tabs{display:flex;gap:2px;background:var(--surface);border-radius:9px;padding:3px;border:1px solid var(--border);flex-wrap:wrap}
.tab{padding:6px 14px;border-radius:6px;font-size:0.78rem;font-weight:500;color:var(--muted2);background:none;border:none;transition:all .15s;white-space:nowrap}
.tab.active{background:var(--card2);color:var(--white)}
.tab:hover:not(.active){color:var(--white)}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:2.2rem;margin-bottom:10px;opacity:.35}
.loading{display:flex;align-items:center;justify-content:center;padding:50px;color:var(--muted);font-size:0.85rem;gap:10px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;pointer-events:none}
.search-input{padding-left:34px!important}
.turno-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.turno-item:last-child{border-bottom:none}
.turno-hora-start{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;color:var(--white)}
.turno-hora-end{font-size:0.68rem;color:var(--muted)}
.caja-item{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border)}
.caja-item:last-child{border-bottom:none}
.caja-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.deuda-card{background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:15px;margin-bottom:12px}
.deuda-progress{height:3px;background:var(--border2);border-radius:2px;overflow:hidden;margin-top:10px}
.deuda-progress-bar{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.notification{
  position:fixed;bottom:24px;right:24px;z-index:500;
  background:var(--card);border:1px solid var(--border2);
  border-radius:10px;padding:14px 18px;max-width:320px;
  display:flex;align-items:center;gap:10px;
  animation:slideUp .3s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
.notif-icon{font-size:1.2rem}
.notif-text{font-size:0.83rem;color:var(--white);flex:1}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .3s ease both}
@media(max-width:800px){
  .sidebar{transform:translateX(-100%)}
  .main{margin-left:0}
  .grid-2,.grid-3{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ══════════════════════════════════════════════════════════
//  SUPABASE CONFIG
//  Reemplazá estas dos variables con tus credenciales
//  Supabase > Settings > API
// ══════════════════════════════════════════════════════════
const SUPABASE_URL = window.__SB_URL__ || '';
const SUPABASE_KEY = window.__SB_KEY__ || '';

let supabase = null;
const getSupabase = (url, key) => {
  if (!supabase) supabase = window.supabase?.createClient || supabase?.createClient(url, key);
  return supabase;
};

// ── UTILS ─────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('es-AR',{style:'currency',currency:'ARS',minimumFractionDigits:0}).format(n||0);
const initials = name => (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
const today = () => new Date().toISOString().split('T')[0];
const estadoBadge = e => {
  const m = {completado:'green',confirmado:'blue',pendiente:'amber',ausente:'red',parcial:'amber',pagada:'green',activo:'green',inactivo:'muted'};
  return <span className={`badge badge-${m[e]||'muted'}`}>{e}</span>;
};

// ── NOTIFICATION ──────────────────────────────────────────
function Notification({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3500); return () => clearTimeout(t); }, []);
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  return (
    <div className="notification">
      <span className="notif-icon">{icons[type]||'💬'}</span>
      <span className="notif-text">{msg}</span>
      <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
    </div>
  );
}

// ── MODAL ─────────────────────────────────────────────────
function Modal({ title, onClose, children, footer }) {
  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">{title}</span>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

// ── CONFIG SCREEN ─────────────────────────────────────────
function ConfigScreen({ onConnect }) {
  const [url, setUrl] = useState('');
  const [key, setKey] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const connect = () => {
    if (!url || !key) { setError('Completá los dos campos.'); return; }
    const urlClean = url.trim().replace(/\/$/, "");
    const keyClean = key.trim();
    try {
      const sb = window.supabase?.createClient || supabase?.createClient(urlClean, keyClean);
      supabase = sb;
      localStorage.setItem('tc_url', urlClean);
      localStorage.setItem('tc_key', keyClean);
      onConnect(sb);
    } catch(e) {
      setError('Error: ' + e.message);
    }
  };

  useEffect(() => {
    const u = localStorage.getItem('tc_url');
    const k = localStorage.getItem('tc_key');
    if (u && k) { setUrl(u); setKey(k); }
  }, []);

  return (
    <div className="config-screen">
      <div className="config-box">
        <div className="config-logo">Turnos<span>Cut</span></div>
        <div className="config-subtitle">Conectá tu base de datos Supabase para activar el sistema completo.</div>

        <div className="config-step">
          <div className="config-step-num">1</div>
          <div className="config-step-title">Creá tu proyecto en Supabase</div>
          <div className="config-step-desc">Entrá a <a href="https://supabase.com" target="_blank">supabase.com</a> → New Project → elegí un nombre y región (ej: South America).</div>
        </div>
        <div className="config-step">
          <div className="config-step-num">2</div>
          <div className="config-step-title">Ejecutá el SQL de la base de datos</div>
          <div className="config-step-desc">En Supabase → SQL Editor → New query → pegá el contenido del archivo <strong>supabase-setup.sql</strong> y hacé clic en Run.</div>
        </div>
        <div className="config-step">
          <div className="config-step-num">3</div>
          <div className="config-step-title">Copiá tus credenciales API</div>
          <div className="config-step-desc">Supabase → Settings → API → copiá <strong>Project URL</strong> y <strong>anon public key</strong>.</div>
        </div>

        <hr className="config-divider" />
        <div className="config-form-title">Pegá tus credenciales acá:</div>

        <div className="form-group">
          <label className="form-label">Project URL</label>
          <input className="form-input" placeholder="https://xxxx.supabase.co" value={url} onChange={e=>setUrl(e.target.value.trim())} autoComplete="off" spellCheck="false" />
          <div style={{fontSize:'.72rem',color:'var(--muted)',marginTop:4}}>Ejemplo: https://sbhovvacbmurtnddufua.supabase.co</div>
        </div>
        <div className="form-group">
          <label className="form-label">Anon Public Key</label>
          <input className="form-input" placeholder="eyJhbGci..." value={key} onChange={e=>setKey(e.target.value.trim())} type="password" autoComplete="off" spellCheck="false" />
          <div style={{fontSize:'.72rem',color:'var(--muted)',marginTop:4}}>Supabase → Settings → API → "anon public" (empieza con eyJ...)</div>
        </div>
        {error && <div className="form-error" style={{marginBottom:12}}>⚠️ {error}</div>}
        <button className="btn btn-gold" style={{width:'100%',justifyContent:'center',padding:'12px'}} onClick={connect} >
          '🚀 Conectar y entrar'
        </button>
        <div style={{marginTop:12,fontSize:'.72rem',color:'var(--muted)',lineHeight:1.6,textAlign:'center'}}>
          ¿Error de conexión? Asegurate de copiar la clave <strong style={{color:'var(--white)'}}>completa</strong> desde Supabase — es muy larga (más de 200 caracteres).
        </div>
      </div>
    </div>
  );
}

// ── AUTH SCREEN ───────────────────────────────────────────
function AuthScreen({ sb, onAuth }) {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass]   = useState('');
  const [nombre, setNombre] = useState('');
  const [bName, setBName]   = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const [ok, setOk]           = useState('');

  const submit = async () => {
    setLoading(true); setError(''); setOk('');
    try {
      if (mode === 'login') {
        const { data, error: e } = await sb.auth.signInWithPassword({ email, password: pass });
        if (e) throw e;
        onAuth(data.user);
      } else {
        const { data, error: e } = await sb.auth.signUp({ email, password: pass });
        if (e) throw e;
        if (data.user) {
          const slug = bName.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-');
          await sb.from('empresas').insert({ owner_id: data.user.id, nombre: bName, slug, email, plan:'pro' });
          await sb.from('usuarios').insert({ auth_id: data.user.id, empresa_id: (await sb.from('empresas').select('id').eq('owner_id',data.user.id).single()).data.id, nombre, email, rol:'dueño' });
          setOk('✅ Cuenta creada. Revisá tu email para confirmar.');
          setMode('login');
        }
      }
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div className="config-screen">
      <div className="config-box" style={{maxWidth:400}}>
        <div className="config-logo" style={{marginBottom:4}}>Turnos<span>Cut</span></div>
        <div className="config-subtitle" style={{marginBottom:24}}>{mode==='login' ? 'Iniciá sesión en tu barbería' : 'Creá tu cuenta gratis'}</div>

        {mode === 'register' && <>
          <div className="form-group"><label className="form-label">Tu nombre</label><input className="form-input" value={nombre} onChange={e=>setNombre(e.target.value)} placeholder="Ej: Marcos García" /></div>
          <div className="form-group"><label className="form-label">Nombre de tu barbería</label><input className="form-input" value={bName} onChange={e=>setBName(e.target.value)} placeholder="Ej: La Vieja Escuela" /></div>
        </>}
        <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" value={email} onChange={e=>setEmail(e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Contraseña</label><input className="form-input" type="password" value={pass} onChange={e=>setPass(e.target.value)} /></div>

        {error && <div className="form-error" style={{marginBottom:12}}>⚠️ {error}</div>}
        {ok    && <div style={{color:'var(--green)',fontSize:'0.8rem',marginBottom:12}}>{ok}</div>}

        <button className="btn btn-gold" style={{width:'100%',justifyContent:'center',padding:'11px'}} onClick={submit} >
          {loading ? '⏳...' : mode==='login' ? '🔑 Entrar' : '🚀 Crear cuenta gratis'}
        </button>
        <button className="btn btn-ghost" style={{width:'100%',justifyContent:'center',marginTop:8,fontSize:'0.8rem'}} onClick={()=>setMode(mode==='login'?'register':'login')}>
          {mode==='login' ? '¿No tenés cuenta? Registrate' : '¿Ya tenés cuenta? Iniciá sesión'}
        </button>
      </div>
    </div>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────
function Dashboard({ sb, empresa }) {
  const [stats, setStats]   = useState({ ingresos:0, egresos:0, turnos:0, completados:0, clientes:0, deudas:0 });
  const [turnos, setTurnos] = useState([]);
  const [movs, setMovs]     = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    if (!empresa) return;
    const [t, c, cj, d] = await Promise.all([
      sb.from('turnos').select('*,clientes(nombre),servicios(nombre,precio),usuarios(nombre)').eq('empresa_id', empresa.id).eq('fecha', today()).order('hora_inicio'),
      sb.from('clientes').select('id',{count:'exact'}).eq('empresa_id', empresa.id),
      sb.from('caja').select('*').eq('empresa_id', empresa.id).eq('fecha', today()).order('hora'),
      sb.from('deudas').select('monto_original,monto_pagado').eq('empresa_id', empresa.id).in('estado',['pendiente','parcial']),
    ]);
    const ingresos = (cj.data||[]).filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+m.monto,0);
    const egresos  = (cj.data||[]).filter(m=>m.tipo==='egreso').reduce((a,m)=>a+m.monto,0);
    const deudas   = (d.data||[]).reduce((a,x)=>a+(x.monto_original-x.monto_pagado),0);
    setStats({ ingresos, egresos, turnos:(t.data||[]).length, completados:(t.data||[]).filter(x=>x.estado==='completado').length, clientes:c.count||0, deudas });
    setTurnos((t.data||[]).slice(0,6));
    setMovs((cj.data||[]).slice(-6).reverse());
    setLoading(false);
  }, [sb, empresa]);

  useEffect(() => { load(); }, [load]);

  // Realtime
  useEffect(() => {
    if (!empresa) return;
    const ch = sb.channel('dashboard-'+empresa.id)
      .on('postgres_changes',{event:'*',schema:'public',table:'turnos',filter:`empresa_id=eq.${empresa.id}`}, load)
      .on('postgres_changes',{event:'*',schema:'public',table:'caja',filter:`empresa_id=eq.${empresa.id}`}, load)
      .subscribe();
    return () => sb.removeChannel(ch);
  }, [sb, empresa, load]);

  if (loading) return <div className="loading">⏳ Cargando datos...</div>;

  return (
    <div className="fade-in">
      <div className="stats-grid">
        <div className="stat-card gold"><div className="stat-icon">💰</div><div className="stat-label">Ingresos hoy</div><div className="stat-value">{fmt(stats.ingresos)}</div><div className="stat-sub">Egresos: {fmt(stats.egresos)}</div></div>
        <div className="stat-card green"><div className="stat-icon">✅</div><div className="stat-label">Turnos completados</div><div className="stat-value">{stats.completados}</div><div className="stat-sub">de {stats.turnos} hoy</div></div>
        <div className="stat-card red"><div className="stat-icon">⚠️</div><div className="stat-label">Deudas pendientes</div><div className="stat-value">{fmt(stats.deudas)}</div></div>
        <div className="stat-card blue"><div className="stat-icon">👥</div><div className="stat-label">Clientes</div><div className="stat-value">{stats.clientes}</div></div>
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="card-header"><span className="card-title">📅 Turnos de hoy</span><span className="badge badge-blue">{new Date().toLocaleDateString('es-AR')}</span></div>
          <div className="card-body">
            {turnos.length===0 ? <div className="empty"><div className="empty-icon">📅</div><div>No hay turnos hoy</div></div> :
              turnos.map(t => (
                <div key={t.id} className="turno-item">
                  <div style={{width:54,flexShrink:0}}>
                    <div className="turno-hora-start">{t.hora_inicio?.slice(0,5)}</div>
                    <div className="turno-hora-end">{t.hora_fin?.slice(0,5)}</div>
                  </div>
                  <div className="avatar">{initials(t.clientes?.nombre||'?')}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,fontSize:'0.85rem',color:'var(--white)'}}>{t.clientes?.nombre||'Sin nombre'}</div>
                    <div style={{fontSize:'0.75rem',color:'var(--muted2)'}}>{t.servicios?.nombre}</div>
                  </div>
                  {estadoBadge(t.estado)}
                  <div style={{fontFamily:'Bebas Neue',fontSize:'1rem',color:'var(--gold)'}}>{fmt(t.precio_cobrado||t.servicios?.precio)}</div>
                </div>
              ))
            }
          </div>
        </div>
        <div className="card">
          <div className="card-header"><span className="card-title">💵 Movimientos de caja</span><span className="badge badge-gold">Saldo: {fmt(stats.ingresos-stats.egresos)}</span></div>
          <div className="card-body">
            {movs.length===0 ? <div className="empty"><div className="empty-icon">💵</div><div>Sin movimientos hoy</div></div> :
              movs.map(m => (
                <div key={m.id} className="caja-item">
                  <div className="caja-dot" style={{background:m.tipo==='ingreso'?'var(--green)':'var(--red)'}} />
                  <div style={{flex:1}}>
                    <div style={{fontSize:'0.82rem',color:'var(--white)'}}>{m.descripcion}</div>
                    <div style={{fontSize:'0.72rem',color:'var(--muted)'}}>{m.hora?.slice(0,5)} · {m.metodo_pago} · {m.categoria}</div>
                  </div>
                  <div style={{fontWeight:700,fontSize:'0.85rem',color:m.tipo==='ingreso'?'var(--green)':'var(--red)'}}>
                    {m.tipo==='ingreso'?'+':'-'}{fmt(m.monto)}
                  </div>
                </div>
              ))
            }
          </div>
        </div>
      </div>
    </div>
  );
}

// ── TURNOS ────────────────────────────────────────────────
function Turnos({ sb, empresa, notify }) {
  const [turnos, setTurnos]     = useState([]);
  const [clientes, setClientes] = useState([]);
  const [servicios, setServicios] = useState([]);
  const [usuarios, setUsuarios] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [filtro, setFiltro]     = useState('todos');
  const [modal, setModal]       = useState(false);
  const [form, setForm]         = useState({ cliente_nombre:'', cliente_id:'', servicio_id:'', barbero_id:'', fecha:today(), hora_inicio:'09:00', notas:'' });

  const load = useCallback(async () => {
    const [t, cl, sv, us] = await Promise.all([
      sb.from('turnos').select('*,clientes(nombre,telefono),servicios(nombre,precio,duracion_min),usuarios(nombre)').eq('empresa_id',empresa.id).eq('fecha',today()).order('hora_inicio'),
      sb.from('clientes').select('id,nombre').eq('empresa_id',empresa.id).eq('activo',true),
      sb.from('servicios').select('*').eq('empresa_id',empresa.id).eq('activo',true),
      sb.from('usuarios').select('id,nombre').eq('empresa_id',empresa.id).eq('activo',true),
    ]);
    setTurnos(t.data||[]); setClientes(cl.data||[]); setServicios(sv.data||[]); setUsuarios(us.data||[]);
    setLoading(false);
  }, [sb, empresa]);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    const ch = sb.channel('turnos-'+empresa.id)
      .on('postgres_changes',{event:'*',schema:'public',table:'turnos',filter:`empresa_id=eq.${empresa.id}`}, load)
      .subscribe();
    return () => sb.removeChannel(ch);
  }, [sb, empresa, load]);

  const guardar = async () => {
    const svc = servicios.find(s=>s.id===form.servicio_id);
    if (!svc || !form.hora_inicio || !form.barbero_id) { notify('Completá todos los campos','error'); return; }
    const [h,m] = form.hora_inicio.split(':').map(Number);
    const dur = svc.duracion_min||30;
    const hf = `${String(h+Math.floor((m+dur)/60)).padStart(2,'0')}:${String((m+dur)%60).padStart(2,'0')}`;
    const row = { empresa_id:empresa.id, barbero_id:form.barbero_id, servicio_id:form.servicio_id, fecha:form.fecha, hora_inicio:form.hora_inicio+':00', hora_fin:hf+':00', notas:form.notas, precio_cobrado:svc.precio, estado:'pendiente' };
    if (form.cliente_id) row.cliente_id = form.cliente_id;
    const { error } = await sb.from('turnos').insert(row);
    if (error) { notify('Error al guardar: '+error.message,'error'); return; }
    notify('Turno guardado ✅','success'); setModal(false); load();
  };

  const cambiarEstado = async (id, estado) => {
    await sb.from('turnos').update({ estado }).eq('id', id);
    notify(`Turno marcado como ${estado}`,'success');
  };

  const filtrados = filtro==='todos' ? turnos : turnos.filter(t=>t.estado===filtro);

  return (
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,gap:12,flexWrap:'wrap'}}>
        <div className="tabs">
          {['todos','pendiente','confirmado','completado','ausente'].map(f=>(
            <button key={f} className={`tab ${filtro===f?'active':''}`} onClick={()=>setFiltro(f)}>{f}</button>
          ))}
        </div>
        <button className="btn btn-gold" onClick={()=>setModal(true)}>+ Nuevo turno</button>
      </div>
      {loading ? <div className="loading">⏳ Cargando...</div> : (
        <div className="card">
          <div className="table-wrap">
            <table>
              <thead><tr><th>Hora</th><th>Cliente</th><th>Servicio</th><th>Barbero</th><th>Precio</th><th>Estado</th><th>Acciones</th></tr></thead>
              <tbody>
                {filtrados.length===0 ? <tr><td colSpan={7}><div className="empty"><div className="empty-icon">📅</div><div>No hay turnos</div></div></td></tr> :
                  filtrados.map(t=>(
                    <tr key={t.id}>
                      <td><div className="turno-hora-start">{t.hora_inicio?.slice(0,5)}</div><div className="turno-hora-end">{t.hora_fin?.slice(0,5)}</div></td>
                      <td><div style={{display:'flex',alignItems:'center',gap:8}}><div className="avatar" style={{width:26,height:26,fontSize:'0.65rem'}}>{initials(t.clientes?.nombre||'?')}</div><span style={{color:'var(--white)',fontWeight:500}}>{t.clientes?.nombre||'Sin nombre'}</span></div></td>
                      <td>{t.servicios?.nombre}</td>
                      <td>{t.usuarios?.nombre}</td>
                      <td style={{fontFamily:'Bebas Neue',fontSize:'1rem',color:'var(--gold)'}}>{fmt(t.precio_cobrado)}</td>
                      <td>{estadoBadge(t.estado)}</td>
                      <td><div style={{display:'flex',gap:5}}>
                        {t.estado==='pendiente'&&<button className="btn btn-sm btn-green" onClick={()=>cambiarEstado(t.id,'completado')}>✓</button>}
                        {!['cancelado','completado'].includes(t.estado)&&<button className="btn btn-sm btn-red" onClick={()=>cambiarEstado(t.id,'ausente')}>✗</button>}
                      </div></td>
                    </tr>
                  ))
                }
              </tbody>
            </table>
          </div>
        </div>
      )}
      {modal && (
        <Modal title="Nuevo turno" onClose={()=>setModal(false)} footer={
          <><button className="btn btn-outline" onClick={()=>setModal(false)}>Cancelar</button>
            <button className="btn btn-gold" onClick={guardar}>Guardar</button></>
        }>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Fecha</label><input type="date" className="form-input" value={form.fecha} onChange={e=>setForm({...form,fecha:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Hora</label><input type="time" className="form-input" value={form.hora_inicio} onChange={e=>setForm({...form,hora_inicio:e.target.value})} /></div>
          </div>
          <div className="form-group"><label className="form-label">Cliente</label>
            <select className="form-select" value={form.cliente_id} onChange={e=>setForm({...form,cliente_id:e.target.value})}>
              <option value="">Sin cliente asignado</option>
              {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
            </select>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Servicio *</label>
              <select className="form-select" value={form.servicio_id} onChange={e=>setForm({...form,servicio_id:e.target.value})}>
                <option value="">Elegir servicio</option>
                {servicios.map(s=><option key={s.id} value={s.id}>{s.nombre} — {fmt(s.precio)}</option>)}
              </select>
            </div>
            <div className="form-group"><label className="form-label">Barbero *</label>
              <select className="form-select" value={form.barbero_id} onChange={e=>setForm({...form,barbero_id:e.target.value})}>
                <option value="">Elegir barbero</option>
                {usuarios.map(u=><option key={u.id} value={u.id}>{u.nombre}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group"><label className="form-label">Notas</label><textarea className="form-textarea" value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})} placeholder="Opcional..." /></div>
        </Modal>
      )}
    </div>
  );
}

function Caja({ sb, empresa, notify }) {
  const [movs, setMovs]     = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal]   = useState(false);
  const [form, setForm]     = useState({ tipo:'ingreso', categoria:'servicio', descripcion:'', monto:'', metodo_pago:'efectivo' });

  const load = useCallback(async () => {
    const { data } = await sb.from('caja').select('*').eq('empresa_id',empresa.id).eq('fecha',today()).order('hora',{ascending:false});
    setMovs(data||[]); setLoading(false);
  }, [sb, empresa]);

  useEffect(() => { load(); }, [load]);

  useEffect(() => {
    const ch = sb.channel('caja-'+empresa.id)
      .on('postgres_changes',{event:'*',schema:'public',table:'caja',filter:`empresa_id=eq.${empresa.id}`}, load)
      .subscribe();
    return () => sb.removeChannel(ch);
  }, [sb, empresa, load]);

  const guardar = async () => {
    if (!form.descripcion || !form.monto) { notify('Completá descripción y monto','error'); return; }
    const { error } = await sb.from('caja').insert({ ...form, monto:parseFloat(form.monto), empresa_id:empresa.id, fecha:today(), hora:new Date().toTimeString().slice(0,8) });
    if (error) { notify('Error: '+error.message,'error'); return; }
    notify('Movimiento registrado ✅','success'); setModal(false); setForm({tipo:'ingreso',categoria:'servicio',descripcion:'',monto:'',metodo_pago:'efectivo'}); load();
  };

  const ingresos = movs.filter(m=>m.tipo==='ingreso').reduce((a,m)=>a+m.monto,0);
  const egresos  = movs.filter(m=>m.tipo==='egreso').reduce((a,m)=>a+m.monto,0);

  return (
    <div className="fade-in">
      <div className="grid-3" style={{marginBottom:18}}>
        <div className="stat-card green"><div className="stat-label">Ingresos hoy</div><div className="stat-value">{fmt(ingresos)}</div></div>
        <div className="stat-card red"><div className="stat-label">Egresos hoy</div><div className="stat-value">{fmt(egresos)}</div></div>
        <div className="stat-card gold"><div className="stat-label">Saldo neto</div><div className="stat-value">{fmt(ingresos-egresos)}</div></div>
      </div>
      <div className="card">
        <div className="card-header"><span className="card-title">Movimientos del día</span><button className="btn btn-gold btn-sm" onClick={()=>setModal(true)}>+ Registrar</button></div>
        {loading ? <div className="loading">⏳ Cargando...</div> : (
          <div className="table-wrap">
            <table>
              <thead><tr><th>Hora</th><th>Descripción</th><th>Categoría</th><th>Método</th><th>Tipo</th><th>Monto</th></tr></thead>
              <tbody>
                {movs.length===0 ? <tr><td colSpan={6}><div className="empty"><div className="empty-icon">💵</div><div>Sin movimientos hoy</div></div></td></tr> :
                  movs.map(m=>(
                    <tr key={m.id}>
                      <td>{m.hora?.slice(0,5)}</td>
                      <td style={{color:'var(--white)'}}>{m.descripcion}</td>
                      <td><span className="badge badge-muted">{m.categoria}</span></td>
                      <td>{m.metodo_pago}</td>
                      <td>{m.tipo==='ingreso'?<span className="badge badge-green">↑ ingreso</span>:<span className="badge badge-red">↓ egreso</span>}</td>
                      <td style={{fontFamily:'Bebas Neue',fontSize:'1rem',color:m.tipo==='ingreso'?'var(--green)':'var(--red)',fontWeight:700}}>{m.tipo==='ingreso'?'+':'-'}{fmt(m.monto)}</td>
                    </tr>
                  ))
                }
              </tbody>
            </table>
          </div>
        )}
      </div>
      {modal && (
        <Modal title="Registrar movimiento" onClose={()=>setModal(false)} footer={
          <><button className="btn btn-outline" onClick={()=>setModal(false)}>Cancelar</button>
            <button className="btn btn-gold" onClick={guardar}>Guardar</button></>
        }>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Tipo</label>
              <select className="form-select" value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})}>
                <option value="ingreso">↑ Ingreso</option><option value="egreso">↓ Egreso</option>
              </select>
            </div>
            <div className="form-group"><label className="form-label">Categoría</label>
              <select className="form-select" value={form.categoria} onChange={e=>setForm({...form,categoria:e.target.value})}>
                {['servicio','producto','alquiler','insumo','otro'].map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
          </div>
          <div className="form-group"><label className="form-label">Descripción *</label><input className="form-input" value={form.descripcion} onChange={e=>setForm({...form,descripcion:e.target.value})} /></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Monto ($) *</label><input type="number" className="form-input" value={form.monto} onChange={e=>setForm({...form,monto:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Método</label>
              <select className="form-select" value={form.metodo_pago} onChange={e=>setForm({...form,metodo_pago:e.target.value})}>
                {['efectivo','transferencia','tarjeta','mp'].map(m=><option key={m}>{m}</option>)}
              </select>
            </div>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ── DEUDAS ────────────────────────────────────────────────
function Deudas({ sb, empresa, notify }) {
  const [deudas, setDeudas] = useState([]);
  const [clientes, setClientes] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [modal, setModal]       = useState(null);  // null | 'nueva' | deuda_id
  const [abono, setAbono]       = useState('');
  const [form, setForm]         = useState({ cliente_id:'', monto_original:'', notas:'', fecha_venc:'' });

  const load = useCallback(async () => {
    const [d, cl] = await Promise.all([
      sb.from('deudas').select('*,clientes(nombre,telefono)').eq('empresa_id',empresa.id).order('creado_en',{ascending:false}),
      sb.from('clientes').select('id,nombre').eq('empresa_id',empresa.id),
    ]);
    setDeudas(d.data||[]); setClientes(cl.data||[]); setLoading(false);
  }, [sb, empresa]);

  useEffect(() => { load(); }, [load]);

  const nuevaDeuda = async () => {
    if (!form.cliente_id || !form.monto_original) { notify('Completá cliente y monto','error'); return; }
    const { error } = await sb.from('deudas').insert({ ...form, empresa_id:empresa.id, monto_original:parseFloat(form.monto_original), estado:'pendiente' });
    if (error) { notify('Error: '+error.message,'error'); return; }
    notify('Deuda registrada ✅','success'); setModal(null); setForm({cliente_id:'',monto_original:'',notas:'',fecha_venc:''}); load();
  };

  const registrarAbono = async (deuda) => {
    const monto = parseFloat(abono)||0;
    if (!monto) return;
    await sb.from('pagos_deudas').insert({ deuda_id:deuda.id, monto, metodo_pago:'efectivo' });
    const newPagado = Math.min((deuda.monto_pagado||0)+monto, deuda.monto_original);
    const estado = newPagado >= deuda.monto_original ? 'pagada' : 'parcial';
    await sb.from('deudas').update({ monto_pagado:newPagado, estado }).eq('id',deuda.id);
    notify('Abono registrado ✅','success'); setModal(null); setAbono(''); load();
  };

  const total = deudas.filter(d=>d.estado!=='pagada').reduce((a,d)=>a+(d.monto_original-(d.monto_pagado||0)),0);

  return (
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div className="stats-grid" style={{flex:1,margin:0,marginRight:14}}>
          <div className="stat-card red"><div className="stat-label">Deuda total pendiente</div><div className="stat-value">{fmt(total)}</div></div>
          <div className="stat-card amber"><div className="stat-label">Clientes con deuda</div><div className="stat-value">{deudas.filter(d=>d.estado!=='pagada').length}</div></div>
        </div>
        <button className="btn btn-gold" style={{flexShrink:0}} onClick={()=>setModal('nueva')}>+ Nueva deuda</button>
      </div>
      {loading ? <div className="loading">⏳ Cargando...</div> : (
        deudas.length===0 ? <div className="empty"><div className="empty-icon">✅</div><div>No hay deudas registradas</div></div> :
        deudas.map(d=>{
          const pct = Math.round(((d.monto_pagado||0)/d.monto_original)*100);
          return (
            <div key={d.id} className="deuda-card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:11}}>
                  <div className="avatar">{initials(d.clientes?.nombre||'?')}</div>
                  <div>
                    <div style={{fontWeight:600,color:'var(--white)',fontSize:'0.88rem'}}>{d.clientes?.nombre}</div>
                    <div style={{fontSize:'0.72rem',color:'var(--muted)'}}>{d.creado_en?.slice(0,10)}{d.notas&&` · ${d.notas}`}</div>
                  </div>
                </div>
                <div style={{textAlign:'right'}}>
                  <div style={{fontFamily:'Bebas Neue',fontSize:'1.25rem',color:d.estado==='pagada'?'var(--green)':'var(--red)'}}>{fmt(d.monto_original-(d.monto_pagado||0))}</div>
                  <div style={{fontSize:'0.7rem',color:'var(--muted)'}}>de {fmt(d.monto_original)} · pagó {fmt(d.monto_pagado||0)}</div>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                {estadoBadge(d.estado)}
                {d.estado!=='pagada'&&<button className="btn btn-sm btn-gold" onClick={()=>{setModal(d.id);setAbono('');}}>Registrar abono</button>}
              </div>
              <div className="deuda-progress"><div className="deuda-progress-bar" style={{width:`${pct}%`}} /></div>
            </div>
          );
        })
      )}
      {modal==='nueva' && (
        <Modal title="Nueva deuda" onClose={()=>setModal(null)} footer={
          <><button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-gold" onClick={nuevaDeuda}>Registrar</button></>
        }>
          <div className="form-group"><label className="form-label">Cliente *</label>
            <select className="form-select" value={form.cliente_id} onChange={e=>setForm({...form,cliente_id:e.target.value})}>
              <option value="">Elegir cliente</option>
              {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
            </select>
          </div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Monto ($) *</label><input type="number" className="form-input" value={form.monto_original} onChange={e=>setForm({...form,monto_original:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Vencimiento</label><input type="date" className="form-input" value={form.fecha_venc} onChange={e=>setForm({...form,fecha_venc:e.target.value})} /></div>
          </div>
          <div className="form-group"><label className="form-label">Notas</label><textarea className="form-textarea" value={form.notas} onChange={e=>setForm({...form,notas:e.target.value})} /></div>
        </Modal>
      )}
      {modal && modal!=='nueva' && (()=>{
        const d = deudas.find(x=>x.id===modal);
        return d ? (
          <Modal title={`Abono — ${d.clientes?.nombre}`} onClose={()=>setModal(null)} footer={
            <><button className="btn btn-outline" onClick={()=>setModal(null)}>Cancelar</button>
              <button className="btn btn-gold" onClick={()=>registrarAbono(d)}>Confirmar abono</button></>
          }>
            <div className="form-group"><label className="form-label">Monto del abono ($)</label><input type="number" className="form-input" value={abono} onChange={e=>setAbono(e.target.value)} autoFocus /></div>
            <div style={{fontSize:'0.8rem',color:'var(--muted2)'}}>Deuda restante: <strong style={{color:'var(--white)'}}>{fmt(d.monto_original-(d.monto_pagado||0))}</strong></div>
          </Modal>
        ) : null;
      })()}
    </div>
  );
}

// ── PRECIOS / SERVICIOS ───────────────────────────────────
function Precios({ sb, empresa, notify }) {
  const [servicios, setServicios] = useState([]);
  const [loading, setLoading]     = useState(true);
  const [modal, setModal]         = useState(false);
  const [editId, setEditId]       = useState(null);
  const [form, setForm]           = useState({ nombre:'', precio:'', duracion_min:'30', descripcion:'' });

  const load = useCallback(async () => {
    const { data } = await sb.from('servicios').select('*').eq('empresa_id',empresa.id).order('nombre');
    setServicios(data||[]); setLoading(false);
  }, [sb, empresa]);

  useEffect(() => { load(); }, [load]);

  const guardar = async () => {
    if (!form.nombre || !form.precio) { notify('Nombre y precio son obligatorios','error'); return; }
    const row = { nombre:form.nombre, precio:parseFloat(form.precio), duracion_min:parseInt(form.duracion_min)||30, descripcion:form.descripcion, empresa_id:empresa.id };
    const { error } = editId ? await sb.from('servicios').update(row).eq('id',editId) : await sb.from('servicios').insert(row);
    if (error) { notify('Error: '+error.message,'error'); return; }
    notify(editId?'Servicio actualizado ✅':'Servicio creado ✅','success');
    setModal(false); setEditId(null); setForm({nombre:'',precio:'',duracion_min:'30',descripcion:''}); load();
  };

  const eliminar = async (id) => {
    await sb.from('servicios').update({ activo:false }).eq('id',id);
    notify('Servicio eliminado','info'); load();
  };

  const editar = (s) => { setForm({nombre:s.nombre,precio:String(s.precio),duracion_min:String(s.duracion_min),descripcion:s.descripcion||''}); setEditId(s.id); setModal(true); };

  return (
    <div className="fade-in">
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
        <button className="btn btn-gold" onClick={()=>{setEditId(null);setForm({nombre:'',precio:'',duracion_min:'30',descripcion:''});setModal(true);}}>+ Nuevo servicio</button>
      </div>
      {loading ? <div className="loading">⏳ Cargando...</div> : (
        <div className="card">
          <div className="table-wrap">
            <table>
              <thead><tr><th>Servicio</th><th>Duración</th><th>Precio</th><th>Acciones</th></tr></thead>
              <tbody>
                {servicios.length===0 ? <tr><td colSpan={4}><div className="empty"><div className="empty-icon">✂️</div><div>No hay servicios</div></div></td></tr> :
                  servicios.map(s=>(
                    <tr key={s.id}>
                      <td style={{color:'var(--white)',fontWeight:500}}>{s.nombre}</td>
                      <td><span className="badge badge-blue">⏱ {s.duracion_min} min</span></td>
                      <td style={{fontFamily:'Bebas Neue',fontSize:'1.15rem',color:'var(--gold)'}}>{fmt(s.precio)}</td>
                      <td><div style={{display:'flex',gap:6}}>
                        <button className="btn btn-sm btn-outline" onClick={()=>editar(s)}>✏️</button>
                        <button className="btn btn-sm btn-red" onClick={()=>eliminar(s.id)}>🗑</button>
                      </div></td>
                    </tr>
                  ))
                }
              </tbody>
            </table>
          </div>
        </div>
      )}
      {modal && (
        <Modal title={editId?'Editar servicio':'Nuevo servicio'} onClose={()=>setModal(false)} footer={
          <><button className="btn btn-outline" onClick={()=>setModal(false)}>Cancelar</button>
            <button className="btn btn-gold" onClick={guardar}>Guardar</button></>
        }>
          <div className="form-group"><label className="form-label">Nombre *</label><input className="form-input" value={form.nombre} onChange={e=>setForm({...form,nombre:e.target.value})} /></div>
          <div className="form-row">
            <div className="form-group"><label className="form-label">Precio ($) *</label><input type="number" className="form-input" value={form.precio} onChange={e=>setForm({...form,precio:e.target.value})} /></div>
            <div className="form-group"><label className="form-label">Duración (min)</label><input type="number" className="form-input" value={form.duracion_min} onChange={e=>setForm({...form,duracion_min:e.target.value})} /></div>
          </div>
          <div className="form-group"><label className="form-label">Descripción</label><textarea className="form-textarea" value={form.descripcion} onChange={e=>setForm({...form,descripcion:e.target.value})} /></div>
        </Modal>
      )}
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────
const PAGES = [
  { id:'dashboard', label:'Dashboard',         icon:'📊', section:'Principal' },
  { id:'turnos',    label:'Turnos',             icon:'📅', section:'Principal' },
  { id:'clientes',  label:'Clientes',           icon:'👥', section:'Principal' },
  { id:'caja',      label:'Caja',               icon:'💵', section:'Finanzas'  },
  { id:'deudas',    label:'Deudas',             icon:'⚠️', section:'Finanzas'  },
  { id:'precios',   label:'Servicios y Precios',icon:'✂️', section:'Config'    },
];

function App() {
  const [sb, setSb]           = useState(null);
  const [user, setUser]       = useState(null);
  const [empresa, setEmpresa] = useState(null);
  const [page, setPage]       = useState('dashboard');
  const [notif, setNotif]     = useState(null);
  const [deudaCount, setDeudaCount] = useState(0);

  const notify = useCallback((msg, type='success') => {
    setNotif({ msg, type, id: Date.now() });
  }, []);

  // Intentar auto-conectar con credenciales guardadas
  useEffect(() => {
    const u = localStorage.getItem('tc_url');
    const k = localStorage.getItem('tc_key');
    if (u && k) {
      const client = window.supabase?.createClient || supabase?.createClient(u, k);
      supabase = client;
      setSb(client);
      client.auth.getSession().then(({ data }) => {
        if (data.session?.user) setUser(data.session.user);
      });
    }
  }, []);

  // Cargar empresa del usuario
  useEffect(() => {
    if (!sb || !user) return;
    sb.from('empresas').select('*').eq('owner_id', user.id).single()
      .then(({ data }) => { if (data) setEmpresa(data); });
  }, [sb, user]);

  // Contar deudas pendientes
  useEffect(() => {
    if (!sb || !empresa) return;
    sb.from('deudas').select('id',{count:'exact'}).eq('empresa_id',empresa.id).in('estado',['pendiente','parcial'])
      .then(({ count }) => setDeudaCount(count||0));
  }, [sb, empresa, page]);

  const logout = async () => {
    await sb.auth.signOut();
    localStorage.removeItem('tc_url'); localStorage.removeItem('tc_key');
    setUser(null); setEmpresa(null); setSb(null); supabase = null;
  };

  // PANTALLAS
  if (!sb) return <ConfigScreen onConnect={client => { setSb(client); }} />;
  if (!user) return <AuthScreen sb={sb} onAuth={u => setUser(u)} />;
  if (!empresa) return <div className="loading" style={{minHeight:'100vh'}}>⏳ Cargando tu barbería...</div>;

  const sections = [...new Set(PAGES.map(p=>p.section))];
  const titles = { dashboard:'Dashboard', turnos:'Turnos', clientes:'Clientes', caja:'Control de Caja', deudas:'Deudas', precios:'Servicios y Precios' };
  const props = { sb, empresa, notify };

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="sidebar-logo">Turnos<span>Cut</span></div>
        <div className="sidebar-empresa">
          <div className="sidebar-empresa-name">{empresa.nombre}</div>
          <div className="plan-badge">⭐ {empresa.plan}</div>
        </div>
        <nav className="nav">
          {sections.map(sec=>(
            <div key={sec}>
              <div className="nav-section">{sec}</div>
              {PAGES.filter(p=>p.section===sec).map(p=>(
                <button key={p.id} className={`nav-item ${page===p.id?'active':''}`} onClick={()=>setPage(p.id)}>
                  <span className="nav-icon">{p.icon}</span>
                  {p.label}
                  {p.id==='deudas' && deudaCount>0 && <span className="nav-badge">{deudaCount}</span>}
                </button>
              ))}
            </div>
          ))}
        </nav>
        <div className="sidebar-footer">
          <span className="sidebar-footer-text">🟢 En vivo</span>
          <button className="logout-btn" onClick={logout}>Salir</button>
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <span className="topbar-title">{titles[page]}</span>
          <div className="topbar-right">
            <div className="realtime-dot" title="Datos en tiempo real" />
            <span style={{fontSize:'0.75rem',color:'var(--muted2)'}}>Realtime</span>
            <span style={{fontSize:'0.78rem',color:'var(--muted2)',marginLeft:8}}>{new Date().toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'})}</span>
          </div>
        </div>
        <div className="content">
          {page==='dashboard' && <Dashboard {...props} />}
          {page==='turnos'    && <Turnos    {...props} />}
          {page==='clientes'  && <Clientes  {...props} />}
          {page==='caja'      && <Caja      {...props} />}
          {page==='deudas'    && <Deudas    {...props} />}
          {page==='precios'   && <Precios   {...props} />}
        </div>
      </main>

      {notif && <Notification key={notif.id} msg={notif.msg} type={notif.type} onClose={()=>setNotif(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
